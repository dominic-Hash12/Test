<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academic Block | St. Joseph's University</title>

<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
}

/* ================= VIDEO ================= */

#videoContainer{

    position:absolute;

    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;

    transition:1s;

}

video{

    width:100%;
    height:100%;

    object-fit:cover;

}

/* ================= VIDEO CONTROLS ================= */

#videoControls{

    position:absolute;

    top:20px;
    right:20px;

    background:rgba(0,0,0,.75);

    padding:12px;

    border-radius:12px;

    color:white;

    z-index:100;

}

#speed{

    padding:5px;
    font-size:16px;

}

/* ================= EXPLORE BUTTON ================= */

#enter360{

    position:absolute;

    bottom:35px;
    left:50%;

    transform:translateX(-50%);

    padding:18px 35px;

    font-size:20px;

    border:none;

    border-radius:50px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    display:none;

    transition:.3s;

    z-index:100;

}

#enter360:hover{

    background:#1d4ed8;

    transform:translateX(-50%) scale(1.05);

}

/* ================= FADE ================= */

#fade{

    position:absolute;

    width:100vw;
    height:100vh;

    background:black;

    opacity:0;

    pointer-events:none;

    transition:1s;

    z-index:500;

}

/* ================= VR ================= */

#vrContainer{

    display:none;

    width:100vw;
    height:100vh;

}

/* ================= TOP BAR ================= */

#topBar{

    position:absolute;

    top:15px;

    left:15px;

    right:15px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    z-index:999;

}

#backBtn{

    padding:14px 22px;

    border:none;

    border-radius:30px;

    background:#dc2626;

    color:white;

    cursor:pointer;

    font-size:16px;

}

#exit360{

    padding:14px 22px;

    border:none;

    border-radius:30px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    display:none;

}

/* ================= INFO PANEL ================= */

#infoPanel{

    position:absolute;

    bottom:25px;
    left:25px;

    width:330px;

    background:rgba(15,23,42,.82);

    backdrop-filter:blur(15px);

    color:white;

    border-radius:20px;

    padding:22px;

    display:none;

    z-index:999;

}

#infoPanel h2{

    margin-bottom:10px;

}

#infoPanel p{

    color:#ddd;

    line-height:1.6;

    margin-bottom:15px;

}

#infoPanel ul{

    margin-left:18px;

}

#infoPanel li{

    margin-bottom:8px;

}

/* ================= BOTTOM NAVIGATION ================= */

#bottomNav{

    position:absolute;

    bottom:25px;

    right:25px;

    display:none;

    gap:15px;

    z-index:999;

}

.navBtn{

    padding:15px 24px;

    border:none;

    border-radius:30px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    font-size:16px;

}

.navBtn:hover{

    background:#1d4ed8;

}

@media(max-width:768px){

#infoPanel{

    width:90%;
    left:5%;
    bottom:20px;

}

#bottomNav{

    right:50%;
    transform:translateX(50%);
    flex-wrap:wrap;

}

}

</style>

</head>

<body>

<div id="fade"></div>

<!-- ================= VIDEO ================= -->

<div id="videoContainer">

<video id="tourVideo" muted controls>

<source src="../videos/science.mp4" type="video/mp4">

</video>

<div id="videoControls">

<label>Speed :</label>

<select id="speed">

<option value="0.5">0.5×</option>
<option value="0.75">0.75×</option>
<option value="1" selected>1×</option>
<option value="1.25">1.25×</option>
<option value="1.5">1.5×</option>
<option value="2">2×</option>

</select>

</div>

<button id="enter360">

🌐 Explore in 360°

</button>

</div>

<!-- ================= VR ================= -->

<div id="vrContainer">

<div id="topBar">

<button id="backBtn" onclick="location.href='../vr.html'">

⬅ Campus Hub

</button>

<button id="exit360">

🎥 Back to Video

</button>

</div>

<div id="infoPanel">

<h2>Academic Block</h2>

<p>

The Science Block houses laboratories, classrooms,
faculty rooms and research facilities for students
across various science disciplines.

</p>

<ul>

<li>🧪 Chemistry Laboratory</li>

<li>🔬 Physics Laboratory</li>

<li>💻 Computer Laboratory</li>

<li>📚 Smart Classrooms</li>

<li>👨‍🏫 Faculty Rooms</li>

</ul>

</div>

<div id="bottomNav">

<button class="navBtn"
onclick="location.href='academy.html'">

Next →

</button>

</div>

<a-scene>

<a-assets>

<img
id="science"
src="../images/science.jpeg">

</a-assets>

<a-sky src="#science"></a-sky>

<a-camera
position="0 1.6 0"
look-controls="magicWindowTrackingEnabled:true">
</a-camera>
</a-scene>

</div>

<script>

// ================= ELEMENTS =================

const video = document.getElementById("tourVideo");
const exploreBtn = document.getElementById("enter360");
const exitBtn = document.getElementById("exit360");
const fade = document.getElementById("fade");
const videoContainer = document.getElementById("videoContainer");
const vrContainer = document.getElementById("vrContainer");
const infoPanel = document.getElementById("infoPanel");
const bottomNav = document.getElementById("bottomNav");
const speed = document.getElementById("speed");

let resumeTime = 43;

// ================= VIDEO =================

video.muted = true;
video.controls = true;

window.addEventListener("load", () => {

    video.play();

});

// ================= PLAYBACK SPEED =================

speed.addEventListener("change", () => {

    video.playbackRate = parseFloat(speed.value);

});

// ================= SHOW 360 BUTTON =================

video.addEventListener("timeupdate", () => {

    if(video.currentTime >= 43){

        exploreBtn.style.display = "block";

    }

});

// ================= ENTER 360 =================

exploreBtn.onclick = () => {

    resumeTime = video.currentTime;

    video.pause();

    fade.style.opacity = 1;

    setTimeout(()=>{

        videoContainer.style.display = "none";

        vrContainer.style.display = "block";

        exitBtn.style.display = "block";

        infoPanel.style.display = "block";

        bottomNav.style.display = "flex";

        fade.style.opacity = 0;

    },1000);

};

// ================= EXIT 360 =================

exitBtn.onclick = () => {

    fade.style.opacity = 1;

    setTimeout(()=>{

        vrContainer.style.display = "none";

        videoContainer.style.display = "flex";

        exitBtn.style.display = "none";

        infoPanel.style.display = "none";

        bottomNav.style.display = "none";

        video.currentTime = resumeTime;

        video.play();

        fade.style.opacity = 0;

    },1000);

};

// ================= MOBILE =================

window.addEventListener("resize",()=>{

    if(window.innerWidth < 768){

        infoPanel.style.width = "90%";

    }else{

        infoPanel.style.width = "330px";

    }

});

// ================= KEYBOARD SHORTCUTS =================

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){

        e.preventDefault();

        if(video.paused){

            video.play();

        }else{

            video.pause();

        }

    }

    if(e.key==="Escape"){

        if(vrContainer.style.display==="block"){

            exitBtn.click();

        }

    }

});

// ================= PREVENT CONTEXT MENU =================

document.addEventListener("contextmenu",(e)=>{

    e.preventDefault();

});

// ================= READY =================

console.log("Science Block Loaded Successfully");

</script>

</body>
</html>
