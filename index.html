<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Campus Navigator VR</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">

        🎓 Campus Navigator VR

    </div>

    <nav>

        <a href="#">Home</a>

        <a href="#">Explore</a>

        <a href="#">Map</a>

        <a href="#">Departments</a>

        <a href="#">About</a>

    </nav>

</header>

<section class="hero">

    <div class="overlay">

        <h1>Explore Your Campus</h1>

        <p>Experience your university in Virtual Reality</p>
        <a href="vr.html">
         <button>Start Campus Tour</button>
        </a>

    </div>

</section>

<section class="search">

    <input type="text" placeholder="Search Buildings...">

</section>

<section class="places">

    <h2>Popular Places</h2>

    <div class="cards">

        <div class="card">
            <img src="images/library.jpg">
            <h3>Library</h3>
        </div>

        <div class="card">
            <img src="images/cafeteria.jpg">
            <h3>Cafeteria</h3>
        </div>

        <div class="card">
            <img src="images/lab.jpg">
            <h3>Computer Lab</h3>
        </div>

        <div class="card">
            <img src="images/auditorium.jpg">
            <h3>Auditorium</h3>
        </div>

    </div>

</section>

<script src="js/script.js"></script>

</body>

</html>
