<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Navigator VR</title>

<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:black;
overflow:hidden;
}

/* ---------------- VIDEO ---------------- */

#videoContainer{

position:absolute;
width:100vw;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:black;

transition:1s;

}

video{

width:100%;
height:100%;
object-fit:cover;

}

/* ---------------- SPEED CONTROL ---------------- */

#videoControls{

position:absolute;

top:20px;
right:20px;

background:rgba(0,0,0,.7);

padding:12px;

border-radius:10px;

color:white;

z-index:100;

}

#speed{

padding:5px;
font-size:16px;

}

/* ---------------- EXPLORE BUTTON ---------------- */

#enter360{

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

padding:18px 35px;

font-size:20px;

border:none;

border-radius:50px;

background:#2563eb;

color:white;

cursor:pointer;

display:none;

transition:.3s;

z-index:100;

}

#enter360:hover{

background:#1746b8;

transform:translateX(-50%) scale(1.05);

}

/* ---------------- EXIT BUTTON ---------------- */

#exit360{

position:absolute;

top:20px;

left:20px;

padding:15px 25px;

font-size:18px;

border:none;

border-radius:40px;

background:#dc2626;

color:white;

cursor:pointer;

display:none;

z-index:9999;

}

/* ---------------- FADE ---------------- */

#fade{

position:absolute;

width:100vw;
height:100vh;

background:black;

opacity:0;

pointer-events:none;

transition:1s;

z-index:500;

}

/* ---------------- VR ---------------- */

#vrContainer{

display:none;

width:100vw;
height:100vh;

}

</style>

</head>

<body>

<div id="fade"></div>

<!-- ================= VIDEO ================= -->

<div id="videoContainer">

<video id="tourVideo" muted controls>

<source src="videos/entrance.mp4" type="video/mp4">

</video>

<div id="videoControls">

<label>Speed :</label>

<select id="speed">

<option value="0.5">0.5×</option>
<option value="0.75">0.75×</option>
<option value="1" selected>1×</option>
<option value="1.25">1.25×</option>
<option value="1.5">1.5×</option>
<option value="2">2×</option>

</select>

</div>

<button id="enter360">

🌐 Explore in 360°

</button>

</div>

<!-- ================= VR ================= -->

<div id="vrContainer">

<button id="exit360">

⬅ Exit 360°

</button>

<a-scene vr-mode-ui="enabled:false">

<a-assets>

<img id="campus" src="images/images.jpeg">

</a-assets>

<a-sky src="#campus"></a-sky>

<a-camera
look-controls="magicWindowTrackingEnabled:true">
</a-camera>

</a-scene>

</div>

<script>

const video = document.getElementById("tourVideo");
const exploreBtn = document.getElementById("enter360");
const exitBtn = document.getElementById("exit360");
const fade = document.getElementById("fade");
const videoContainer = document.getElementById("videoContainer");
const vrContainer = document.getElementById("vrContainer");
const speed = document.getElementById("speed");

let resumeTime = 43;

// ---------------- Video ----------------

video.muted = true;
video.controls = true;
video.play();

// ---------------- Playback Speed ----------------

speed.addEventListener("change",()=>{

video.playbackRate=parseFloat(speed.value);

});

// ---------------- Show Explore Button ----------------

video.addEventListener("timeupdate",()=>{

if(video.currentTime>=43){

exploreBtn.style.display="block";

}

});

// ---------------- Enter 360 ----------------

exploreBtn.onclick=()=>{

resumeTime=video.currentTime;

video.pause();

fade.style.opacity=1;

setTimeout(()=>{

videoContainer.style.display="none";

vrContainer.style.display="block";

exitBtn.style.display="block";

fade.style.opacity=0;

},1000);

};

// ---------------- Exit 360 ----------------

exitBtn.onclick=()=>{

fade.style.opacity=1;

setTimeout(()=>{

vrContainer.style.display="none";

videoContainer.style.display="flex";

exitBtn.style.display="none";

video.currentTime=resumeTime;

video.play();

fade.style.opacity=0;

},1000);

};

</script>

</body>

</html>
