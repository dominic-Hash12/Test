<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Navigator VR</title>

<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:black;
overflow:hidden;
}

/* ---------------- VIDEO ---------------- */

#videoContainer{

position:absolute;

width:100vw;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:black;

transition:1s;
}

video{

width:100%;

height:100%;

object-fit:cover;

}

/* ---------------- HOTSPOT ---------------- */

#enter360{

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

padding:18px 35px;

font-size:20px;

border:none;

border-radius:50px;

background:#2563eb;

color:white;

cursor:pointer;

display:none;

transition:.3s;

z-index:10;

}

#enter360:hover{

background:#1746b8;

transform:translateX(-50%) scale(1.05);

}

/* ---------------- FADE ---------------- */

#fade{

position:absolute;

width:100vw;

height:100vh;

background:black;

opacity:0;

pointer-events:none;

transition:1s;

z-index:50;

}

/* ---------------- VR ---------------- */

#vrContainer{

display:none;

width:100vw;

height:100vh;

}

</style>

</head>

<body>

<div id="fade"></div>

<div id="videoContainer">

<video id="tourVideo">

<source src="videos/entrance.mp4" type="video/mp4">

</video>

<button id="enter360">

🌐 Explore in 360°

</button>

</div>

<div id="vrContainer">

<a-scene vr-mode-ui="enabled:false">

<a-assets>

<img id="campus" src="images/images.jpeg">

</a-assets>

<a-sky src="#campus"></a-sky>

<a-camera

look-controls="magicWindowTrackingEnabled:true">

</a-camera>

</a-scene>

</div>

<script>

const video=document.getElementById("tourVideo");

const button=document.getElementById("enter360");

const fade=document.getElementById("fade");

const videoContainer=document.getElementById("videoContainer");

const vrContainer=document.getElementById("vrContainer");

video.play();

/* Show button after 15 seconds */

video.addEventListener("timeupdate",()=>{

if(video.currentTime>15){

button.style.display="block";

}

});

/* Switch to VR */

button.onclick=()=>{

video.pause();

fade.style.opacity=1;

setTimeout(()=>{

videoContainer.style.display="none";

vrContainer.style.display="block";

fade.style.opacity=0;

},1000);

};

</script>

</body>

</html>
